<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>材料資料庫</title>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:   #1a56db;
      --green:  #0e9f6e;
      --red:    #e02424;
      --amber:  #b45309;
      --amb-bg: #fffbeb;
      --amb-bd: #f59e0b;
      --gray50: #f9fafb;
      --gray100:#f3f4f6;
      --gray200:#e5e7eb;
      --gray400:#9ca3af;
      --gray600:#4b5563;
      --gray800:#1f2937;
    }
    body { font-family:"Noto Sans TC",system-ui,sans-serif; background:var(--gray100); color:var(--gray800); min-height:100vh; }

    /* ── Header ── */
    header {
      background:var(--blue); color:#fff; padding:0 24px; height:52px;
      display:flex; align-items:center; gap:16px;
      box-shadow:0 1px 6px rgba(0,0,0,.2); position:sticky; top:0; z-index:100;
    }
    header h1 { font-size:1rem; font-weight:700; }
    .hstats { margin-left:auto; display:flex; gap:16px; font-size:.8rem; opacity:.85; }
    .hstats strong { font-weight:700; }

    /* ── Layout ── */
    .layout {
      max-width:1200px; margin:0 auto; padding:20px 16px;
      display:grid; grid-template-columns:350px 1fr; gap:20px; align-items:start;
    }
    @media(max-width:900px){ .layout{ grid-template-columns:1fr; } }

    /* ── Card ── */
    .card { background:#fff; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.08); overflow:hidden; }

    /* ── Accordion ── */
    .acc-item { border-bottom:1px solid var(--gray100); }
    .acc-item:last-child { border-bottom:none; }
    .acc-hd {
      width:100%; display:flex; align-items:center; gap:8px;
      padding:11px 16px; background:none; border:none; cursor:pointer; text-align:left;
      transition:background .12s;
    }
    .acc-hd:hover { background:var(--gray50); }
    .acc-name { font-size:.88rem; font-weight:700; }
    .acc-n {
      border-radius:999px; padding:1px 8px; font-size:.72rem; font-weight:700;
      background:var(--amb-bg); color:var(--amber);
    }
    .acc-n.zero { background:var(--gray100); color:var(--gray400); }
    .acc-chev { margin-left:auto; font-size:.6rem; color:var(--gray400); transition:transform .2s; }
    .acc-chev.open { transform:rotate(180deg); }
    .acc-body { padding:12px 16px 14px; border-top:1px solid var(--gray100); background:var(--gray50); }

    /* ── Selector group ── */
    .sg { margin-bottom:10px; }
    .sg-label { font-size:.7rem; font-weight:700; color:var(--gray600); letter-spacing:.04em; margin-bottom:5px; }
    .sg-btns { display:flex; flex-wrap:wrap; gap:5px; }
    .sb {
      border:1.5px solid var(--gray200); border-radius:6px;
      padding:5px 11px; font-size:.8rem; font-weight:500; color:var(--gray600);
      background:#fff; cursor:pointer; transition:all .12s; white-space:nowrap;
    }
    .sb:hover  { border-color:var(--amb-bd); color:var(--amber); background:var(--amb-bg); }
    .sb.on     { border-color:var(--amb-bd); color:var(--amber); background:var(--amb-bg); font-weight:700; }
    .fixed-tag {
      display:inline-block; background:var(--gray100); border-radius:5px;
      padding:4px 10px; font-size:.8rem; color:var(--gray600); font-weight:600;
    }

    /* ── Form fields ── */
    .f2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0 10px; }
    .field { display:flex; flex-direction:column; gap:3px; }
    .field label { font-size:.7rem; font-weight:700; color:var(--gray600); }
    .field input {
      border:1.5px solid var(--gray200); border-radius:6px;
      padding:6px 8px; font-size:.85rem; background:#fff; width:100%;
    }
    .field input:focus { outline:none; border-color:var(--blue); }
    .field input[type=number] { text-align:right; }
    .custom-in {
      border:1.5px solid var(--amb-bd); border-radius:6px;
      padding:6px 8px; font-size:.82rem; width:100%;
      background:var(--amb-bg); margin-top:7px;
    }
    .custom-in:focus { outline:none; }

    /* ── Buttons ── */
    .btn {
      display:inline-flex; align-items:center; gap:5px;
      padding:7px 14px; border-radius:7px; font-size:.85rem; font-weight:600;
      cursor:pointer; border:none; transition:opacity .15s; white-space:nowrap;
    }
    .btn:disabled    { opacity:.35; cursor:not-allowed; }
    .btn:hover:not(:disabled) { opacity:.85; }
    .btn-add   { background:var(--amber); color:#fff; width:100%; justify-content:center; }
    .btn-blue  { background:var(--blue);  color:#fff; flex:1; justify-content:center; }
    .btn-ghost { background:var(--gray100); color:var(--gray600); }
    .btn-sync   { background:#ecfdf5; color:#065f46; border:1.5px solid #a7f3d0; }
    .btn-import { background:#f5f3ff; color:#5b21b6; border:1.5px solid #c4b5fd; }
    .btn-sm     { padding:4px 10px; font-size:.77rem; }

    /* ── Right column list header ── */
    .sec-hd {
      display:flex; align-items:center; gap:8px;
      padding:11px 16px; border-bottom:1.5px solid var(--gray100);
    }
    .sec-title { font-size:.88rem; font-weight:700; }
    .sec-n {
      border-radius:999px; padding:1px 9px; font-size:.72rem; font-weight:700;
    }
    .sec-sp { flex:1; }
    .lumber-title { color:#92400e; }
    .lumber-n     { background:#fef3c7; color:#92400e; }
    .other-title  { color:#1e40af; }
    .other-n      { background:#dbeafe; color:#1e40af; }

    /* ── Search row ── */
    .search-row { padding:7px 16px; border-bottom:1px solid var(--gray100); display:flex; gap:7px; }
    .search-row input, .search-row select {
      border:1.5px solid var(--gray200); border-radius:6px; padding:5px 9px; font-size:.8rem;
    }
    .search-row input { flex:1; }
    .search-row input:focus, .search-row select:focus { outline:none; border-color:var(--blue); }

    /* ── Table ── */
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; min-width:440px; }
    thead tr { background:var(--gray50); }
    th {
      padding:7px 10px; text-align:left; font-size:.71rem; font-weight:700;
      color:var(--gray400); letter-spacing:.04em; white-space:nowrap;
      border-bottom:1.5px solid var(--gray200);
    }
    th.r { text-align:right; }
    th.sortable { cursor:pointer; user-select:none; white-space:nowrap; }
    th.sortable:hover { background:var(--gray100); color:var(--gray800); }
    th.sortable .arr { font-size:.65rem; opacity:.5; margin-left:2px; }
    th.sortable.active .arr { opacity:1; color:var(--blue); }
    td { padding:0; border-bottom:1px solid var(--gray100); vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--gray50); }
    .ci { width:100%; border:none; background:transparent; padding:7px 10px; font-size:.83rem; }
    .ci:focus { outline:none; background:#fff; box-shadow:inset 0 0 0 2px var(--blue); }
    .ci.r { text-align:right; }
    td.cat-td { padding:7px 10px; }
    .cat-tag {
      display:inline-block; border-radius:5px; padding:2px 7px;
      font-size:.72rem; font-weight:700; background:var(--amb-bg); color:var(--amber);
    }
    td.spec-td { padding:7px 10px; font-size:.83rem; white-space:nowrap; }
    td.del-td  { padding:4px 8px; width:34px; }
    .del-btn {
      border:none; background:transparent; color:var(--gray400);
      cursor:pointer; border-radius:4px; padding:3px 5px; font-size:.85rem;
    }
    .del-btn:hover { color:var(--red); background:#fee2e2; }

    /* ── Other form (inline) ── */
    .other-form { padding:12px 16px; border-bottom:1px solid var(--gray100); background:var(--gray50); }
    .other-form .f3 { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:8px; }
    .other-form .f3 .span2 { grid-column:span 2; }

    /* ── Empty ── */
    .empty { padding:30px 20px; text-align:center; color:var(--gray400); font-size:.83rem; }
    .empty-icon { font-size:1.8rem; margin-bottom:6px; }

    /* ── Sheets card ── */
    .sheets-toggle {
      width:100%; display:flex; align-items:center; gap:8px;
      padding:10px 16px; background:none; border:none; cursor:pointer;
      font-size:.72rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
      color:var(--gray600); transition:background .12s;
    }
    .sheets-toggle:hover { background:var(--gray50); }
    .sheets-toggle .arr { margin-left:auto; font-size:.6rem; transition:transform .2s; }
    .sheets-toggle.open .arr { transform:rotate(180deg); }
    .sheets-body { padding:12px 16px; border-top:1px solid var(--gray100); }
    .sid-input {
      width:100%; border:1.5px solid var(--gray200); border-radius:6px;
      padding:6px 9px; font-size:.77rem; font-family:"Consolas",monospace;
    }
    .sid-input:focus { outline:none; border-color:var(--blue); }
    .sid-hint { margin-top:7px; font-size:.7rem; color:var(--gray400); line-height:1.6; }
    .dot { width:7px; height:7px; border-radius:50%; display:inline-block; }
    .dot.on  { background:var(--green); }
    .dot.off { background:var(--gray400); }

    /* ── Sheets 設定面板 ── */
    .auth-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .auth-status {
      display:inline-flex; align-items:center; gap:5px;
      font-size:.78rem; font-weight:600;
    }
    .auth-status.ok  { color:#065f46; }
    .auth-status.no  { color:var(--gray400); }
    .sid-row { display:flex; gap:7px; align-items:center; margin-bottom:8px; }
    .btn-create { background:#f0fdf4; color:#065f46; border:1.5px solid #6ee7b7; }
    .btn-auth   { background:#eff6ff; color:#1e40af; border:1.5px solid #93c5fd; }
    .sheets-link { font-size:.72rem; color:var(--blue); text-decoration:none; }
    .sheets-link:hover { text-decoration:underline; }

    /* ── Toast ── */
    .toast-area { position:fixed; bottom:18px; right:18px; display:flex; flex-direction:column; gap:5px; z-index:999; }
    .toast {
      background:var(--gray800); color:#fff; padding:8px 14px;
      border-radius:7px; font-size:.83rem; box-shadow:0 4px 12px rgba(0,0,0,.2);
      animation:fadeUp .18s ease;
    }
    .toast.ok  { background:#065f46; }
    .toast.err { background:#991b1b; }
    @keyframes fadeUp { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }
  </style>
</head>
<body x-data="app()" x-init="init()">

<header>
  <h1>材料資料庫</h1>
  <div class="hstats">
    <span>板材角材 <strong x-text="lumber.length"></strong> 筆</span>
    <span>其他材料 <strong x-text="other.length"></strong> 筆</span>
  </div>
</header>

<div class="layout">

  <!-- ══ 左欄：折疊表單 ══ -->
  <div>
    <div class="card">

      <!-- ① 夾板 -->
      <div class="acc-item">
        <button class="acc-hd" @click="forms['夾板'].open=!forms['夾板'].open">
          <span class="acc-name">夾板</span>
          <span class="acc-n" :class="{zero:catCount('夾板')===0}" x-text="catCount('夾板')+'筆'"></span>
          <span class="acc-chev" :class="{open:forms['夾板'].open}">▼</span>
        </button>
        <div class="acc-body" x-show="forms['夾板'].open">
          <div class="sg">
            <div class="sg-label">尺寸</div>
            <div class="sg-btns">
              <template x-for="s in ['4×8尺','3×7尺','3×6尺']" :key="s">
                <button class="sb" :class="{on:forms['夾板'].size===s&&!forms['夾板'].isCustom}"
                  @click="forms['夾板'].isCustom=false;forms['夾板'].size=s" x-text="s"></button>
              </template>
            </div>
          </div>
          <div class="sg">
            <div class="sg-label">厚度</div>
            <div class="sg-btns">
              <template x-for="t in ['18mm','15mm','12mm','9mm','7mm','5mm','3.6mm','3mm']" :key="t">
                <button class="sb" :class="{on:forms['夾板'].thickness===t&&!forms['夾板'].isCustom}"
                  @click="forms['夾板'].isCustom=false;forms['夾板'].thickness=t" x-text="t"></button>
              </template>
            </div>
          </div>
          <div class="sg">
            <div class="sg-label">特規</div>
            <div class="sg-btns">
              <button class="sb" :class="{on:forms['夾板'].isCustom}"
                @click="forms['夾板'].isCustom=!forms['夾板'].isCustom;forms['夾板'].size='';forms['夾板'].thickness=''">特規尺寸</button>
            </div>
            <input x-show="forms['夾板'].isCustom" class="custom-in" x-model="forms['夾板'].customSpec" placeholder="輸入規格，如 4×8 8mm" />
          </div>
          <div x-show="specReady('夾板')" style="margin-top:8px;">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;">
              <div class="field"><label>廠商</label><input x-model="forms['夾板'].supplier" @keydown.enter="addItem('夾板')" /></div>
              <div class="field"><label>單位</label><input list="lumber-unit-list" x-model="forms['夾板'].unit" @change="recordUnit(forms['夾板'].unit)" style="text-align:center;" /></div>
              <div class="field"><label>單價（元）</label><input type="number" min="0" x-model.number="forms['夾板'].price" @keydown.enter="addItem('夾板')" /></div>
            </div>
          </div>
          <button class="btn btn-add" @click="addItem('夾板')" :disabled="!canAdd('夾板')">＋ 新增夾板</button>
        </div>
      </div>

      <!-- ② 木心板 -->
      <div class="acc-item">
        <button class="acc-hd" @click="forms['木心板'].open=!forms['木心板'].open">
          <span class="acc-name">木心板</span>
          <span class="acc-n" :class="{zero:catCount('木心板')===0}" x-text="catCount('木心板')+'筆'"></span>
          <span class="acc-chev" :class="{open:forms['木心板'].open}">▼</span>
        </button>
        <div class="acc-body" x-show="forms['木心板'].open">
          <div class="sg">
            <div class="sg-label">尺寸</div>
            <div class="sg-btns">
              <template x-for="s in ['4×8尺','4×7尺','3×7尺','3×6尺']" :key="s">
                <button class="sb" :class="{on:forms['木心板'].size===s}"
                  @click="forms['木心板'].size=s" x-text="s"></button>
              </template>
            </div>
          </div>
          <div class="sg">
            <div class="sg-label">厚度</div>
            <div class="sg-btns">
              <template x-for="t in ['5.5分','2分','1分']" :key="t">
                <button class="sb" :class="{on:forms['木心板'].thickness===t}"
                  @click="forms['木心板'].thickness=t" x-text="t"></button>
              </template>
            </div>
          </div>
          <div x-show="specReady('木心板')" style="margin-top:8px;">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;">
              <div class="field"><label>廠商</label><input x-model="forms['木心板'].supplier" @keydown.enter="addItem('木心板')" /></div>
              <div class="field"><label>單位</label><input list="lumber-unit-list" x-model="forms['木心板'].unit" @change="recordUnit(forms['木心板'].unit)" style="text-align:center;" /></div>
              <div class="field"><label>單價（元）</label><input type="number" min="0" x-model.number="forms['木心板'].price" @keydown.enter="addItem('木心板')" /></div>
            </div>
          </div>
          <button class="btn btn-add" @click="addItem('木心板')" :disabled="!canAdd('木心板')">＋ 新增木心板</button>
        </div>
      </div>

      <!-- ③ 波麗板 -->
      <div class="acc-item">
        <button class="acc-hd" @click="forms['波麗板'].open=!forms['波麗板'].open">
          <span class="acc-name">波麗板</span>
          <span class="acc-n" :class="{zero:catCount('波麗板')===0}" x-text="catCount('波麗板')+'筆'"></span>
          <span class="acc-chev" :class="{open:forms['波麗板'].open}">▼</span>
        </button>
        <div class="acc-body" x-show="forms['波麗板'].open">
          <div class="sg">
            <div class="sg-label">尺寸</div>
            <span class="fixed-tag">4×8（固定）</span>
          </div>
          <div class="sg">
            <div class="sg-label">厚度</div>
            <div class="sg-btns">
              <template x-for="t in ['6分','2分','1分']" :key="t">
                <button class="sb" :class="{on:forms['波麗板'].thickness===t}"
                  @click="setPoliThickness('波麗板',t)" x-text="t"></button>
              </template>
            </div>
          </div>
          <div class="sg">
            <div class="sg-label">面材</div>
            <div class="sg-btns">
              <template x-for="f in ['單面','雙面']" :key="f">
                <button class="sb" :class="{on:forms['波麗板'].face===f}"
                  @click="forms['波麗板'].face=f" x-text="f"></button>
              </template>
            </div>
          </div>
          <div x-show="specReady('波麗板')" style="margin-top:8px;">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px;">
              <div class="field"><label>色號</label><input x-model="forms['波麗板'].colorCode" @keydown.enter="addItem('波麗板')" placeholder="如 W001" /></div>
              <div class="field"><label>廠商</label><input x-model="forms['波麗板'].supplier" @keydown.enter="addItem('波麗板')" /></div>
              <div class="field"><label>單位</label><input list="lumber-unit-list" x-model="forms['波麗板'].unit" @change="recordUnit(forms['波麗板'].unit)" style="text-align:center;" /></div>
              <div class="field"><label>單價（元）</label><input type="number" min="0" x-model.number="forms['波麗板'].price" @keydown.enter="addItem('波麗板')" /></div>
            </div>
          </div>
          <button class="btn btn-add" @click="addItem('波麗板')" :disabled="!canAdd('波麗板')">＋ 新增波麗板</button>
        </div>
      </div>

      <!-- ④ 美耐皿板 -->
      <div class="acc-item">
        <button class="acc-hd" @click="forms['美耐皿板'].open=!forms['美耐皿板'].open">
          <span class="acc-name">美耐皿板</span>
          <span class="acc-n" :class="{zero:catCount('美耐皿板')===0}" x-text="catCount('美耐皿板')+'筆'"></span>
          <span class="acc-chev" :class="{open:forms['美耐皿板'].open}">▼</span>
        </button>
        <div class="acc-body" x-show="forms['美耐皿板'].open">
          <div class="sg">
            <div class="sg-label">尺寸</div>
            <span class="fixed-tag">4×8（固定）</span>
          </div>
          <div class="sg">
            <div class="sg-label">厚度</div>
            <div class="sg-btns">
              <template x-for="t in ['6分','2分','1分']" :key="t">
                <button class="sb" :class="{on:forms['美耐皿板'].thickness===t}"
                  @click="setPoliThickness('美耐皿板',t)" x-text="t"></button>
              </template>
            </div>
          </div>
          <div class="sg">
            <div class="sg-label">面材</div>
            <div class="sg-btns">
              <template x-for="f in ['單面','雙面']" :key="f">
                <button class="sb" :class="{on:forms['美耐皿板'].face===f}"
                  @click="forms['美耐皿板'].face=f" x-text="f"></button>
              </template>
            </div>
          </div>
          <div x-show="specReady('美耐皿板')" style="margin-top:8px;">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px;">
              <div class="field"><label>色號</label><input x-model="forms['美耐皿板'].colorCode" @keydown.enter="addItem('美耐皿板')" placeholder="如 W001" /></div>
              <div class="field"><label>廠商</label><input x-model="forms['美耐皿板'].supplier" @keydown.enter="addItem('美耐皿板')" /></div>
              <div class="field"><label>單位</label><input list="lumber-unit-list" x-model="forms['美耐皿板'].unit" @change="recordUnit(forms['美耐皿板'].unit)" style="text-align:center;" /></div>
              <div class="field"><label>單價（元）</label><input type="number" min="0" x-model.number="forms['美耐皿板'].price" @keydown.enter="addItem('美耐皿板')" /></div>
            </div>
          </div>
          <button class="btn btn-add" @click="addItem('美耐皿板')" :disabled="!canAdd('美耐皿板')">＋ 新增美耐皿板</button>
        </div>
      </div>

      <!-- ⑤ 防火板（矽酸鈣板） -->
      <div class="acc-item">
        <button class="acc-hd" @click="forms['防火板'].open=!forms['防火板'].open">
          <span class="acc-name">防火板（矽酸鈣板）</span>
          <span class="acc-n" :class="{zero:catCount('防火板')===0}" x-text="catCount('防火板')+'筆'"></span>
          <span class="acc-chev" :class="{open:forms['防火板'].open}">▼</span>
        </button>
        <div class="acc-body" x-show="forms['防火板'].open">
          <div class="sg">
            <div class="sg-label">尺寸</div>
            <div class="sg-btns">
              <template x-for="s in ['4×8尺','4×6尺','3×6尺']" :key="s">
                <button class="sb" :class="{on:forms['防火板'].size===s}"
                  @click="forms['防火板'].size=s" x-text="s"></button>
              </template>
            </div>
          </div>
          <div class="sg">
            <div class="sg-label">厚度</div>
            <div class="sg-btns">
              <template x-for="t in ['12mm','9mm','6mm']" :key="t">
                <button class="sb" :class="{on:forms['防火板'].thickness===t}"
                  @click="forms['防火板'].thickness=t" x-text="t"></button>
              </template>
            </div>
          </div>
          <div x-show="specReady('防火板')" style="margin-top:8px;">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;">
              <div class="field"><label>廠商</label><input x-model="forms['防火板'].supplier" @keydown.enter="addItem('防火板')" /></div>
              <div class="field"><label>單位</label><input list="lumber-unit-list" x-model="forms['防火板'].unit" @change="recordUnit(forms['防火板'].unit)" style="text-align:center;" /></div>
              <div class="field"><label>單價（元）</label><input type="number" min="0" x-model.number="forms['防火板'].price" @keydown.enter="addItem('防火板')" /></div>
            </div>
          </div>
          <button class="btn btn-add" @click="addItem('防火板')" :disabled="!canAdd('防火板')">＋ 新增防火板</button>
        </div>
      </div>

      <!-- ⑥ 塑膠壁板 -->
      <div class="acc-item">
        <button class="acc-hd" @click="forms['塑膠壁板'].open=!forms['塑膠壁板'].open">
          <span class="acc-name">塑膠壁板</span>
          <span class="acc-n" :class="{zero:catCount('塑膠壁板')===0}" x-text="catCount('塑膠壁板')+'筆'"></span>
          <span class="acc-chev" :class="{open:forms['塑膠壁板'].open}">▼</span>
        </button>
        <div class="acc-body" x-show="forms['塑膠壁板'].open">
          <div class="sg">
            <div class="sg-label">種類</div>
            <div class="sg-btns">
              <template x-for="k in ['全實心','半實心','全空心']" :key="k">
                <button class="sb" :class="{on:forms['塑膠壁板'].kind===k}"
                  @click="forms['塑膠壁板'].kind=k" x-text="k"></button>
              </template>
            </div>
          </div>
          <div class="sg">
            <div class="sg-label">規格（選填）</div>
            <input style="border:1.5px solid var(--gray200);border-radius:6px;padding:6px 8px;font-size:.83rem;width:100%;background:#fff;"
              x-model="forms['塑膠壁板'].spec" placeholder="如顏色、花樣等" />
          </div>
          <div x-show="specReady('塑膠壁板')" style="margin-top:8px;">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;">
              <div class="field"><label>廠商</label><input x-model="forms['塑膠壁板'].supplier" @keydown.enter="addItem('塑膠壁板')" /></div>
              <div class="field"><label>單位</label><input list="lumber-unit-list" x-model="forms['塑膠壁板'].unit" @change="recordUnit(forms['塑膠壁板'].unit)" style="text-align:center;" /></div>
              <div class="field"><label>單價（元）</label><input type="number" min="0" x-model.number="forms['塑膠壁板'].price" @keydown.enter="addItem('塑膠壁板')" /></div>
            </div>
          </div>
          <button class="btn btn-add" @click="addItem('塑膠壁板')" :disabled="!canAdd('塑膠壁板')">＋ 新增塑膠壁板</button>
        </div>
      </div>

      <!-- ⑦ 角材（預設折疊） -->
      <div class="acc-item">
        <button class="acc-hd" @click="forms['角材'].open=!forms['角材'].open">
          <span class="acc-name">角材</span>
          <span class="acc-n" :class="{zero:catCount('角材')===0}" x-text="catCount('角材')+'筆'"></span>
          <span class="acc-chev" :class="{open:forms['角材'].open}">▼</span>
        </button>
        <div class="acc-body" x-show="forms['角材'].open">
          <div class="sg">
            <div class="sg-label">規格</div>
            <div class="sg-btns">
              <template x-for="s in ['12尺 × 1.8吋','12尺 × 1.2吋','9尺 × 1.8吋','9尺 × 1.2吋','8尺 × 1.8吋','8尺 × 1.2吋']" :key="s">
                <button class="sb" :class="{on:forms['角材'].spec===s&&!forms['角材'].isCustom}"
                  @click="forms['角材'].isCustom=false;forms['角材'].spec=s" x-text="s"></button>
              </template>
            </div>
          </div>
          <div class="sg">
            <div class="sg-label">厚度</div>
            <span class="fixed-tag">1寸（固定）</span>
          </div>
          <div class="sg">
            <div class="sg-label">特規</div>
            <div class="sg-btns">
              <button class="sb" :class="{on:forms['角材'].isCustom}"
                @click="forms['角材'].isCustom=!forms['角材'].isCustom;forms['角材'].spec=''">特規尺寸</button>
            </div>
            <input x-show="forms['角材'].isCustom" class="custom-in"
              x-model="forms['角材'].customSpec" placeholder="輸入規格，如 10尺×2吋" />
          </div>
          <div x-show="specReady('角材')" style="margin-top:8px;">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;">
              <div class="field"><label>廠商</label><input x-model="forms['角材'].supplier" @keydown.enter="addItem('角材')" /></div>
              <div class="field"><label>單位</label><input list="lumber-unit-list" x-model="forms['角材'].unit" @change="recordUnit(forms['角材'].unit)" style="text-align:center;" /></div>
              <div class="field"><label>單價（元）</label><input type="number" min="0" x-model.number="forms['角材'].price" @keydown.enter="addItem('角材')" /></div>
            </div>
          </div>
          <button class="btn btn-add" @click="addItem('角材')" :disabled="!canAdd('角材')">＋ 新增角材</button>
        </div>
      </div>

    </div><!-- /accordion card -->

    <!-- 板材單位管理 -->
    <div class="card" style="margin-top:8px;padding:10px 16px;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-size:.7rem;font-weight:700;color:var(--gray600);white-space:nowrap;">板材單位</span>
        <template x-for="u in lumberUnits" :key="u">
          <span style="display:inline-flex;align-items:center;gap:3px;background:var(--gray100);border-radius:5px;padding:2px 8px;font-size:.78rem;font-weight:600;">
            <span x-text="u"></span>
            <button @click="removeLumberUnit(u)" style="border:none;background:none;color:var(--gray400);cursor:pointer;font-size:.65rem;padding:0 0 0 2px;line-height:1;" title="移除">✕</button>
          </span>
        </template>
      </div>
    </div>

    <!-- Google Sheets 設定 -->
    <div class="card" style="margin-top:12px;">
      <button class="sheets-toggle" :class="sheetsOpen?'open':''" @click="sheetsOpen=!sheetsOpen">
        <span class="dot" :class="(isAuthenticated && spreadsheetId)?'on':'off'"></span>
        Google Sheets 設定
        <span class="arr">▼</span>
      </button>
      <div class="sheets-body" x-show="sheetsOpen">

        <!-- 後端網址 -->
        <div class="field" style="margin-bottom:10px;">
          <label style="font-size:.7rem;font-weight:700;color:var(--gray600);">後端網址（Railway）</label>
          <input class="sid-input" x-model="backendUrl" @input="save()"
            placeholder="https://your-app.railway.app" />
          <p class="sid-hint" style="margin-top:4px;">留空時使用相對路徑（本地開發）</p>
        </div>

        <!-- 授權狀態列 -->
        <div class="auth-row">
          <span class="auth-status" :class="isAuthenticated?'ok':'no'">
            <span x-text="isAuthenticated ? '✓ 已授權 Google 帳號' : '○ 尚未授權'"></span>
          </span>
          <button class="btn btn-auth btn-sm" style="margin-left:auto;"
            @click="startAuth" :disabled="authLoading">
            <span x-show="!authLoading" x-text="isAuthenticated ? '重新授權' : '開始授權'"></span>
            <span x-show="authLoading">授權中…請看瀏覽器</span>
          </button>
        </div>

        <!-- Spreadsheet ID -->
        <div class="sid-row">
          <input class="sid-input" x-model="spreadsheetId" @input="save()"
            placeholder="Spreadsheet ID" :disabled="!isAuthenticated" style="flex:1;" />
          <button class="btn btn-create btn-sm" @click="createSpreadsheet"
            :disabled="!isAuthenticated || creating" title="在 Google Drive 建立新試算表">
            <span x-show="!creating">＋ 新建表</span>
            <span x-show="creating">建立中…</span>
          </button>
        </div>

        <!-- 試算表連結 -->
        <template x-if="spreadsheetId">
          <a class="sheets-link"
            :href="'https://docs.google.com/spreadsheets/d/'+spreadsheetId+'/edit'"
            target="_blank">↗ 開啟試算表</a>
        </template>
        <p x-show="!spreadsheetId" class="sid-hint">
          點「＋ 新建表」自動建立，或貼上現有試算表 ID
        </p>

        <!-- 從 Sheets 載入 -->
        <div style="margin-top:10px;border-top:1px solid var(--gray100);padding-top:10px;">
          <button class="btn btn-import" style="width:100%;justify-content:center;"
            @click="loadFromSheets"
            :disabled="!isAuthenticated || !spreadsheetId || loadingFromSheets">
            <span x-show="!loadingFromSheets">⬇ 從 Sheets 同步到本裝置</span>
            <span x-show="loadingFromSheets">讀取中…</span>
          </button>
          <p class="sid-hint" style="margin-top:5px;">覆蓋本機資料，適合在新裝置上同步最新資料</p>
        </div>

      </div>
    </div>

  </div><!-- /左欄 -->

  <!-- ══ 右欄：列表 ══ -->
  <div>

    <!-- 板材角材列表 -->
    <div class="card">
      <div class="sec-hd">
        <span class="sec-title lumber-title">🪵 板材 / 角材</span>
        <span class="sec-n lumber-n" x-text="lumberFiltered.length+' / '+lumber.length+' 筆'"></span>
        <div class="sec-sp"></div>
        <button class="btn btn-ghost btn-sm" @click="exportCsv('lumber')" x-show="lumber.length>0">CSV</button>
        <button class="btn btn-sync btn-sm" @click="syncToSheets('lumber')"
          :disabled="syncingLumber||!spreadsheetId||lumber.length===0" x-show="lumber.length>0">
          <span x-show="!syncingLumber">⬆ Sheets</span>
          <span x-show="syncingLumber">同步中…</span>
        </button>
      </div>
      <div class="search-row" x-show="lumber.length>0">
        <input type="search" x-model="lumberQ" placeholder="搜尋規格、廠商…" />
        <select x-model="lumberCatFilter">
          <option value="">全部分類</option>
          <template x-for="c in LUMBER_CATS" :key="c"><option :value="c" x-text="c"></option></template>
        </select>
      </div>
      <div class="table-wrap">
        <template x-if="lumberFiltered.length>0">
          <table>
            <thead>
              <tr>
                <th class="sortable" :class="{active:lumberSortKey==='category'}" @click="sortBy('lumber','category')">分類<span class="arr" x-text="sortArrow('lumber','category')"></span></th>
                <th class="sortable" :class="{active:lumberSortKey==='spec'}"     @click="sortBy('lumber','spec')">規格<span class="arr" x-text="sortArrow('lumber','spec')"></span></th>
                <th class="sortable" :class="{active:lumberSortKey==='colorCode'}" @click="sortBy('lumber','colorCode')">色號<span class="arr" x-text="sortArrow('lumber','colorCode')"></span></th>
                <th class="sortable" :class="{active:lumberSortKey==='supplier'}" @click="sortBy('lumber','supplier')">廠商<span class="arr" x-text="sortArrow('lumber','supplier')"></span></th>
                <th>單位</th>
                <th class="sortable r" :class="{active:lumberSortKey==='unit_price'}" @click="sortBy('lumber','unit_price')">單價<span class="arr" x-text="sortArrow('lumber','unit_price')"></span></th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <template x-for="row in lumberFiltered" :key="row.id">
                <tr>
                  <td class="cat-td"><span class="cat-tag" x-text="row.category"></span></td>
                  <td class="spec-td" x-text="specSummary(row)"></td>
                  <td><input class="ci" x-model="row.colorCode" @change="save()" placeholder="—" style="max-width:80px;" /></td>
                  <td><input class="ci" x-model="row.supplier" @change="save()" /></td>
                  <td><input class="ci" list="lumber-unit-list" x-model="row.unit" @change="save();recordUnit(row.unit)" style="max-width:55px;text-align:center;" /></td>
                  <td><input class="ci r" type="number" x-model.number="row.unit_price" @change="save()" /></td>
                  <td class="del-td"><button class="del-btn" @click="deleteLumber(row.id)">✕</button></td>
                </tr>
              </template>
            </tbody>
          </table>
        </template>
        <div class="empty" x-show="lumber.length===0"><div class="empty-icon">🪵</div>尚無板材 / 角材資料</div>
        <div class="empty" x-show="lumber.length>0&&lumberFiltered.length===0">找不到符合項目</div>
      </div>
    </div>

    <!-- 其他材料 -->
    <div class="card" style="margin-top:18px;">
      <div class="sec-hd">
        <span class="sec-title other-title">🔩 其他材料</span>
        <span class="sec-n other-n" x-text="otherFiltered.length+' / '+other.length+' 筆'"></span>
        <div class="sec-sp"></div>
        <template x-if="otherCategories.length>1">
          <select x-model="otherCatFilter" class="btn btn-ghost btn-sm" style="border:none;cursor:pointer;">
            <option value="">全部類別</option>
            <template x-for="c in otherCategories" :key="c"><option :value="c" x-text="c"></option></template>
          </select>
        </template>
        <button class="btn btn-ghost btn-sm" @click="exportCsv('other')" x-show="other.length>0">CSV</button>
        <button class="btn btn-sync btn-sm" @click="syncToSheets('other')"
          :disabled="syncingOther||!spreadsheetId||other.length===0" x-show="other.length>0">
          <span x-show="!syncingOther">⬆ Sheets</span>
          <span x-show="syncingOther">同步中…</span>
        </button>
      </div>

      <!-- 其他材料新增表單 -->
      <div class="other-form">
        <div class="f3">
          <div class="field">
            <label>類別</label>
            <input x-model="of.category" list="cat-list" @keydown.enter="addOther" placeholder="五金 / 地板 / 鋼刷…" />
            <datalist id="cat-list">
              <template x-for="c in categoryOptions" :key="c"><option :value="c"></option></template>
            </datalist>
          </div>
          <div class="field">
            <label>品名</label>
            <input x-model="of.name" @keydown.enter="addOther" placeholder="品名" />
          </div>
          <div class="field">
            <label>規格</label>
            <input x-model="of.spec" @keydown.enter="addOther" placeholder="尺寸、型號等" />
          </div>
          <div class="field">
            <label>單位</label>
            <input x-model="of.unit" @keydown.enter="addOther" placeholder="個 / 包 / 罐…" />
          </div>
          <div class="field span2">
            <label>單價（元）</label>
            <input type="number" min="0" x-model.number="of.unit_price" @keydown.enter="addOther" />
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-blue" @click="addOther">＋ 新增其他材料</button>
          <button class="btn btn-ghost" @click="resetOther">清空</button>
        </div>
      </div>

      <div class="search-row" x-show="other.length>0">
        <input type="search" x-model="otherQ" placeholder="搜尋品名、規格…" />
      </div>
      <div class="table-wrap">
        <template x-if="otherFiltered.length>0">
          <table>
            <thead>
              <tr>
                <th class="sortable" :class="{active:otherSortKey==='category'}" @click="sortBy('other','category')">類別<span class="arr" x-text="sortArrow('other','category')"></span></th>
                <th class="sortable" :class="{active:otherSortKey==='name'}"     @click="sortBy('other','name')">品名<span class="arr" x-text="sortArrow('other','name')"></span></th>
                <th class="sortable" :class="{active:otherSortKey==='spec'}"     @click="sortBy('other','spec')">規格<span class="arr" x-text="sortArrow('other','spec')"></span></th>
                <th>單位</th>
                <th class="sortable r" :class="{active:otherSortKey==='unit_price'}" @click="sortBy('other','unit_price')">單價<span class="arr" x-text="sortArrow('other','unit_price')"></span></th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <template x-for="row in otherFiltered" :key="row.id">
                <tr>
                  <td><input class="ci" list="cat-list-inline" x-model="row.category" @change="save()" /></td>
                  <td><input class="ci" x-model="row.name"       @change="save()" /></td>
                  <td><input class="ci" x-model="row.spec"       @change="save()" /></td>
                  <td><input class="ci" x-model="row.unit"       @change="save()" /></td>
                  <td><input class="ci r" type="number" x-model.number="row.unit_price" @change="save()" /></td>
                  <td class="del-td"><button class="del-btn" @click="deleteOther(row.id)">✕</button></td>
                </tr>
              </template>
            </tbody>
          </table>
        </template>
        <div class="empty" x-show="other.length===0"><div class="empty-icon">🔩</div>尚無其他材料資料</div>
        <div class="empty" x-show="other.length>0&&otherFiltered.length===0">找不到符合項目</div>
      </div>
    </div>

  </div><!-- /右欄 -->
</div>

<datalist id="lumber-unit-list">
  <template x-for="u in lumberUnits" :key="u"><option :value="u"></option></template>
</datalist>
<datalist id="cat-list-inline">
  <template x-for="c in categoryOptions" :key="c"><option :value="c"></option></template>
</datalist>

<div class="toast-area">
  <template x-for="t in toasts" :key="t.id">
    <div class="toast" :class="t.type" x-text="t.msg"></div>
  </template>
</div>

<script>
const STORAGE_KEY = "materials-db-v1";
const LUMBER_CATS = ['夾板','木心板','波麗板','美耐皿板','防火板','塑膠壁板','角材'];

const INIT_DATA = {"板材角材":[{"分類":"角材","規格":"12尺1.8吋1寸","廠商":"百順","單位":"支","單價":86.4},{"分類":"角材","規格":"12尺1.8吋1寸","廠商":"永新","單位":"支","單價":90.72},{"分類":"角材","規格":"12尺1.2吋1寸","廠商":"百順","單位":"支","單價":57.6},{"分類":"角材","規格":"12尺1.2吋1寸","廠商":"永新","單位":"支","單價":60.48},{"分類":"角材","規格":"8尺1.8吋1寸","廠商":"百順","單位":"支","單價":59.04},{"分類":"角材","規格":"8尺1.2吋1寸","廠商":"百順","單位":"支","單價":39.36},{"分類":"夾板","規格":"4*8 18mm","廠商":"百順","單位":"支","單價":86.4},{"分類":"夾板","規格":"4*8 18mm","廠商":"永新","單位":"支","單價":90.72},{"分類":"夾板","規格":"4*8 12mm","廠商":"百順","單位":"支","單價":57.6},{"分類":"夾板","規格":"4*8 12mm","廠商":"永新","單位":"支","單價":60.48},{"分類":"夾板","規格":"4*8 12mm 8尺","廠商":"百順","單位":"支","單價":39.36},{"分類":"夾板","規格":"4*8 18mm 8尺","廠商":"百順","單位":"支","單價":59.04},{"分類":"夾板","規格":"4*8 7mm","廠商":"","單位":"片","單價":410},{"分類":"夾板","規格":"3*6 3mm","廠商":"","單位":"片","單價":130},{"分類":"木心板","規格":"4*8 5.5分 麻","廠商":"嘉峰","單位":"片","單價":620},{"分類":"木心板","規格":"4*8 5.5分 白B5","廠商":"嘉峰","單位":"片","單價":860},{"分類":"波麗板","規格":"4*8 2分 白B5","廠商":"嘉峰","單位":"片","單價":530},{"分類":"防火板","規格":"3*6 6mm","廠商":"佳大","單位":"片","單價":265},{"分類":"防火板","規格":"3*6 9mm","廠商":"南亞","單位":"片","單價":390},{"分類":"防火板","規格":"4*6 9mm","廠商":"佳大","單位":"片","單價":385}]};

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function blankOther() { return { category:'', name:'', spec:'', unit:'', unit_price:'' }; }

function initForms() {
  return {
    '夾板':    { open:true,  size:'', thickness:'', isCustom:false, customSpec:'', supplier:'', unit:'片', price:'' },
    '木心板':  { open:false, size:'', thickness:'', supplier:'', unit:'片', price:'' },
    '波麗板':  { open:false, thickness:'', face:'', colorCode:'', supplier:'', unit:'片', price:'' },
    '美耐皿板':{ open:false, thickness:'', face:'', colorCode:'', supplier:'', unit:'片', price:'' },
    '防火板':  { open:false, size:'', thickness:'', supplier:'', unit:'片', price:'' },
    '塑膠壁板':{ open:false, kind:'', spec:'', supplier:'', unit:'尺', price:'' },
    '角材':    { open:false, spec:'', isCustom:false, customSpec:'', supplier:'', unit:'支', price:'' },
  };
}

function app() {
  return {
    forms: initForms(),
    lumber: [],
    other:  [],
    of: blankOther(),

    lumberQ: '', lumberCatFilter: '',
    lumberUnits: ['片', '支', '尺', '條', '才'],
    lumberSortKey: '', lumberSortDir: 1,
    otherQ:  '', otherCatFilter:  '',
    otherSortKey: '', otherSortDir: 1,

    spreadsheetId: '', sheetsOpen: false,
    backendUrl: '',
    isAuthenticated: false, authLoading: false, creating: false,
    syncingLumber: false, syncingOther: false, loadingFromSheets: false,
    toasts: [],
    LUMBER_CATS,

    init() {
      // 載入 localStorage
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          const d = JSON.parse(raw);
          this.lumber        = d.lumber        || [];
          this.other         = d.other         || [];
          this.spreadsheetId = d.spreadsheetId || '';
          this.backendUrl    = d.backendUrl    || '';
          this.lumberUnits   = d.lumberUnits   || ['片', '支', '尺', '條', '才'];
        } catch(_) {}
      } else {
        (INIT_DATA['板材角材'] || []).forEach(r => {
          const cat = r['分類'] || '';
          if (!LUMBER_CATS.includes(cat)) return;
          this.lumber.push({
            id: uid(), category: cat,
            raw_spec:   String(r['規格']  || ''),
            supplier:   String(r['廠商']  || ''),
            unit:       String(r['單位']  || '片'),
            unit_price: r['單價'] ?? '',
            size: null, thickness: null, face: null, kind: null,
            spec: String(r['規格'] || ''), is_custom: false,
          });
        });
        this.save();
      }
      // 角材規格格式遷移（舊格式 → 新格式 "12尺 × 1.8吋"）
      const KAKUZAI_MAP = {
        '12尺1.8吋1寸':'12尺 × 1.8吋', '12尺1.2吋1寸':'12尺 × 1.2吋',
        '9尺1.8吋1寸': '9尺 × 1.8吋',  '9尺1.2吋1寸': '9尺 × 1.2吋',
        '8尺1.8吋1寸': '8尺 × 1.8吋',  '8尺1.2吋1寸': '8尺 × 1.2吋',
        '12尺×1.8吋':  '12尺 × 1.8吋', '12尺×1.2吋':  '12尺 × 1.2吋',
        '9尺×1.8吋':   '9尺 × 1.8吋',  '9尺×1.2吋':   '9尺 × 1.2吋',
        '8尺×1.8吋':   '8尺 × 1.8吋',  '8尺×1.2吋':   '8尺 × 1.2吋',
      };
      let migrated = false;
      this.lumber = this.lumber.map(r => {
        if (r.category !== '角材' || r.is_custom) return r;
        if (r.raw_spec && KAKUZAI_MAP[r.raw_spec])
          return { ...r, spec: KAKUZAI_MAP[r.raw_spec], raw_spec: null, migrated: true };
        if (!r.raw_spec && r.spec && KAKUZAI_MAP[r.spec])
          return { ...r, spec: KAKUZAI_MAP[r.spec], migrated: true };
        return r;
      });
      if (this.lumber.some(r => r.migrated)) {
        this.lumber = this.lumber.map(r => { const {migrated,...rest}=r; return rest; });
        this.save();
      }

      // 檢查後端授權狀態
      this.checkAuthStatus();
    },

    async checkAuthStatus() {
      try {
        const res  = await fetch(this.backendUrl + '/auth/status');
        const data = await res.json();
        this.isAuthenticated = data.authenticated;
      } catch(_) { this.isAuthenticated = false; }
    },

    async startAuth() {
      this.authLoading = true;
      this.sheetsOpen  = true;
      try {
        const res  = await fetch(this.backendUrl + '/auth/start', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail);
        this.isAuthenticated = true;
        this.toast(data.message || '授權成功', 'ok');
      } catch(e) {
        this.toast('授權失敗：' + e.message, 'err');
      } finally {
        this.authLoading = false;
      }
    },

    async createSpreadsheet() {
      this.creating = true;
      try {
        const res  = await fetch(this.backendUrl + '/sheets/create', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail);
        this.spreadsheetId = data.spreadsheet_id;
        this.save();
        this.toast(`已建立「${data.title}」`, 'ok');
      } catch(e) {
        this.toast('建立失敗：' + e.message, 'err');
      } finally {
        this.creating = false;
      }
    },

    // 波麗板/美耐皿板：選厚度時決定是否顯示面別
    setPoliThickness(cat, t) {
      this.forms[cat].thickness = t;
    },

    specReady(cat) {
      const f = this.forms[cat];
      switch(cat) {
        case '夾板':     return f.isCustom ? !!f.customSpec.trim() : (!!f.size && !!f.thickness);
        case '木心板':   return !!f.size && !!f.thickness;
        case '波麗板':
        case '美耐皿板': return !!f.thickness && !!f.face;
        case '防火板':   return !!f.size && !!f.thickness;
        case '塑膠壁板': return !!f.kind;
        case '角材':     return f.isCustom ? !!f.customSpec.trim() : !!f.spec;
        default: return false;
      }
    },

    removeLumberUnit(u) {
      if (this.lumberUnits.length <= 1) return;
      this.lumberUnits = this.lumberUnits.filter(x => x !== u);
      ['夾板','木心板','波麗板','美耐皿板','防火板','塑膠壁板','角材'].forEach(cat => {
        if (this.forms[cat].unit === u)
          this.forms[cat].unit = this.lumberUnits[0] || '片';
      });
      this.save();
    },

    recordUnit(u) {
      const v = (u || '').trim();
      if (v && !this.lumberUnits.includes(v)) {
        this.lumberUnits.push(v);
        this.save();
      }
    },

    // 各分類新增驗證
    canAdd(cat) {
      const f = this.forms[cat];
      switch(cat) {
        case '夾板':     return f.isCustom ? !!f.customSpec.trim() : (!!f.size && !!f.thickness);
        case '木心板':   return !!f.size && !!f.thickness;
        case '波麗板':
        case '美耐皿板': return !!f.thickness && !!f.face;
        case '防火板':   return !!f.size && !!f.thickness;
        case '塑膠壁板': return !!f.kind;
        case '角材':     return f.isCustom ? !!f.customSpec.trim() : !!f.spec;
        default: return false;
      }
    },

    // 規格摘要（列表顯示）
    specSummary(row) {
      if (row.raw_spec) return row.raw_spec;
      const { category: c, size, thickness, face, kind, spec, is_custom } = row;
      switch(c) {
        case '夾板':     return is_custom ? `特規 ${spec}` : `${size}　${thickness}`;
        case '木心板':   return `${size}　${thickness}`;
        case '波麗板':
        case '美耐皿板': return `4×8尺　${thickness} ${face || ''}`.trim();
        case '防火板':   return `${size}　${thickness}`;
        case '塑膠壁板': return `${kind}${spec ? ' ' + spec : ''}`;
        case '角材':     return is_custom ? `特規 ${spec}` : `${spec} × 1寸`;
        default: return spec || '';
      }
    },

    // 新增板材角材
    addItem(cat) {
      if (!this.canAdd(cat)) return;
      const f = this.forms[cat];
      const u = (f.unit || '').trim() || '片';
      if (u && !this.lumberUnits.includes(u)) this.lumberUnits.push(u);
      const item = {
        id: uid(), category: cat,
        supplier: f.supplier.trim(), unit_price: f.price ?? '',
        size: null, thickness: null, face: null, kind: null,
        spec: '', is_custom: false, unit: u,
      };
      switch(cat) {
        case '夾板':
          if (f.isCustom) { item.is_custom = true; item.spec = f.customSpec.trim(); }
          else { item.size = f.size; item.thickness = f.thickness; }
          break;
        case '木心板':
          item.size = f.size; item.thickness = f.thickness; break;
        case '波麗板':
        case '美耐皿板':
          item.size = '4×8尺'; item.thickness = f.thickness; item.face = f.face;
          item.colorCode = f.colorCode.trim(); break;
        case '防火板':
          item.size = f.size; item.thickness = f.thickness; break;
        case '塑膠壁板':
          item.kind = f.kind; item.spec = f.spec.trim(); break;
        case '角材':
          if (f.isCustom) { item.is_custom = true; item.spec = f.customSpec.trim(); }
          else { item.spec = f.spec; item.thickness = '1寸'; }
          break;
      }
      this.lumber.unshift(item);
      this.save();
      this.toast(`已新增 ${cat}`);
      this.resetForm(cat);
    },

    resetForm(cat) {
      const open = this.forms[cat].open;
      this.forms[cat] = { ...initForms()[cat], open };
    },

    catCount(cat) { return this.lumber.filter(r => r.category === cat).length; },

    // 新增其他材料
    addOther() {
      if (!this.of.name.trim()) { this.toast('品名不能空白', 'err'); return; }
      this.other.unshift({
        id: uid(),
        category:   this.of.category.trim(),
        name:       this.of.name.trim(),
        spec:       this.of.spec.trim(),
        unit:       this.of.unit.trim(),
        unit_price: this.of.unit_price ?? '',
      });
      this.save(); this.toast('已新增材料'); this.resetOther();
    },
    resetOther() { this.of = blankOther(); },

    deleteLumber(id) { this.lumber = this.lumber.filter(r => r.id !== id); this.save(); },
    deleteOther(id)  { this.other  = this.other.filter(r => r.id !== id);  this.save(); },

    sortBy(type, key) {
      if (type === 'lumber') {
        if (this.lumberSortKey === key) this.lumberSortDir *= -1;
        else { this.lumberSortKey = key; this.lumberSortDir = 1; }
      } else {
        if (this.otherSortKey === key) this.otherSortDir *= -1;
        else { this.otherSortKey = key; this.otherSortDir = 1; }
      }
    },
    sortArrow(type, key) {
      const k = type === 'lumber' ? this.lumberSortKey : this.otherSortKey;
      const d = type === 'lumber' ? this.lumberSortDir : this.otherSortDir;
      if (k !== key) return '⇅';
      return d > 0 ? '↑' : '↓';
    },

    get lumberFiltered() {
      const q = this.lumberQ.toLowerCase(), cat = this.lumberCatFilter;
      let result = this.lumber.filter(r => {
        if (cat && r.category !== cat) return false;
        if (!q) return true;
        return (r.category + this.specSummary(r) + (r.supplier||'') + (r.colorCode||'')).toLowerCase().includes(q);
      });
      if (this.lumberSortKey) {
        const k = this.lumberSortKey, d = this.lumberSortDir;
        result = [...result].sort((a, b) => {
          let av = k === 'spec' ? this.specSummary(a) : (k === 'unit_price' ? (a[k] ?? 0) : (a[k] ?? ''));
          let bv = k === 'spec' ? this.specSummary(b) : (k === 'unit_price' ? (b[k] ?? 0) : (b[k] ?? ''));
          if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * d;
          return String(av).localeCompare(String(bv), 'zh-TW') * d;
        });
      }
      return result;
    },
    get otherFiltered() {
      const q = this.otherQ.toLowerCase(), cat = this.otherCatFilter;
      let result = this.other.filter(r => {
        if (cat && r.category !== cat) return false;
        if (!q) return true;
        return (r.category + r.name + r.spec + r.unit).toLowerCase().includes(q);
      });
      if (this.otherSortKey) {
        const k = this.otherSortKey, d = this.otherSortDir;
        result = [...result].sort((a, b) => {
          let av = k === 'unit_price' ? (a[k] ?? 0) : (a[k] ?? '');
          let bv = k === 'unit_price' ? (b[k] ?? 0) : (b[k] ?? '');
          if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * d;
          return String(av).localeCompare(String(bv), 'zh-TW') * d;
        });
      }
      return result;
    },
    get otherCategories() {
      return [...new Set(this.other.map(r => r.category).filter(Boolean))].sort();
    },
    get categoryOptions() {
      const d = ['五金','地板','鋼刷','油漆','填縫','矽利康','螺絲','水電'];
      return [...new Set([...d, ...this.otherCategories])].sort();
    },

    save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        lumber: this.lumber, other: this.other,
        spreadsheetId: this.spreadsheetId, backendUrl: this.backendUrl,
        lumberUnits: this.lumberUnits,
      }));
    },

    exportCsv(type) {
      let headers, rows, filename;
      if (type === 'lumber') {
        headers  = ['分類','規格','廠商','單位','單價'];
        rows     = this.lumber.map(r => [r.category, this.specSummary(r), r.supplier, r.unit, r.unit_price]);
        filename = '板材角材.csv';
      } else {
        headers  = ['類別','品名','規格','單位','單價'];
        rows     = this.other.map(r => [r.category, r.name, r.spec, r.unit, r.unit_price]);
        filename = '其他材料.csv';
      }
      const csv = [headers, ...rows]
        .map(r => r.map(v => `"${String(v??'').replace(/"/g,'""')}"`).join(','))
        .join('\r\n');
      Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'})),
        download: filename,
      }).click();
    },

    async syncToSheets(type) {
      if (!this.spreadsheetId) { this.sheetsOpen = true; this.toast('請先填入 Spreadsheet ID','err'); return; }
      const isL = type === 'lumber';
      if (isL) this.syncingLumber = true; else this.syncingOther = true;
      const payload = isL
        ? { items: this.lumber.map(r => ({...r, spec_label: this.specSummary(r)})) }
        : { items: this.other };
      try {
        const res  = await fetch(this.backendUrl + `/sync/${type}?spreadsheet_id=${encodeURIComponent(this.spreadsheetId)}`, {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) {
          const detail = data.detail;
          throw new Error(Array.isArray(detail)
            ? detail.map(e => e.msg || JSON.stringify(e)).join('；')
            : (detail || '伺服器錯誤'));
        }
        this.toast(`已寫入「${data.sheet}」${data.written} 筆`, 'ok');
      } catch(e) {
        this.toast('寫入失敗：' + e.message, 'err');
      } finally {
        if (isL) this.syncingLumber = false; else this.syncingOther = false;
      }
    },

    async loadFromSheets() {
      if (!this.spreadsheetId) { this.sheetsOpen = true; this.toast('請先填入 Spreadsheet ID', 'err'); return; }
      this.loadingFromSheets = true;
      try {
        const sid = encodeURIComponent(this.spreadsheetId);
        const [lRes, oRes] = await Promise.all([
          fetch(this.backendUrl + `/load/lumber?spreadsheet_id=${sid}`),
          fetch(this.backendUrl + `/load/other?spreadsheet_id=${sid}`),
        ]);
        if (!lRes.ok) throw new Error((await lRes.json()).detail || '讀取板材失敗');
        if (!oRes.ok) throw new Error((await oRes.json()).detail || '讀取其他材料失敗');
        const lData = await lRes.json();
        const oData = await oRes.json();

        // 轉換板材角材（欄位：分類、規格、廠商、單位、單價）
        this.lumber = (lData.rows || []).map(r => ({
          id: uid(),
          category:   String(r['分類']  || ''),
          raw_spec:   String(r['規格']  || ''),
          supplier:   String(r['廠商']  || ''),
          unit:       String(r['單位']  || '片'),
          unit_price: r['單價'] !== '' ? Number(r['單價']) : '',
          size: null, thickness: null, face: null, kind: null,
          spec: String(r['規格'] || ''), is_custom: false,
        }));

        // 轉換其他材料（欄位：類別、品名、規格、單位、單價）
        this.other = (oData.rows || []).map(r => ({
          id: uid(),
          category:   String(r['類別']  || ''),
          name:       String(r['品名']  || ''),
          spec:       String(r['規格']  || ''),
          unit:       String(r['單位']  || ''),
          unit_price: r['單價'] !== '' ? Number(r['單價']) : '',
        }));

        this.save();
        this.toast(`已載入板材 ${this.lumber.length} 筆、其他材料 ${this.other.length} 筆`, 'ok');
      } catch(e) {
        this.toast('載入失敗：' + e.message, 'err');
      } finally {
        this.loadingFromSheets = false;
      }
    },

    toast(msg, type='ok') {
      const id = uid();
      this.toasts.push({id, msg, type});
      setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 2800);
    },
  };
}
</script>
</body>
</html>
